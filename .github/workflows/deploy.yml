name: Deploy to VPS

# Runs on every push to master. SSHes into the VPS and runs deploy.sh.
on:
  push:
    branches: [master]
  workflow_dispatch: {}   # also lets you trigger a deploy manually from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /home/tj/apps/gymapp
            bash deploy.sh
