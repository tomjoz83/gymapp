<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0e14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Trainer" />
  <title>Personal Trainer</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Vendored locally so the app boots with no internet dependency. -->
  <script src="vendor/vue.global.prod.js"></script>
  <script src="logic.js"></script>
  <script src="app.js"></script>
</head>
<body>
  <div id="app">
    <div v-if="!unlocked" class="unlock">
      <h1>🏋️ Personal Trainer</h1>
      <input v-model="tokenInput" type="password" placeholder="Passphrase" class="unlock-input" @keyup.enter="unlock" />
      <button class="btn-primary" @click="unlock">Unlock</button>
      <p v-if="error" class="error">{{ error }}</p>
    </div>
    <div v-else class="app-shell">
      <main class="view">
        <section v-if="view === 'home'">
          <h2>Home</h2>
          <p v-if="!activeProgram" class="muted">No active program. Load one via the program loader.</p>
          <div v-else>
            <p class="muted">{{ activeProgram.name }} · Week {{ currentWeek }}/{{ activeProgram.weekCount }}</p>
          </div>
        </section>
        <section v-else-if="view === 'progress'"><h2>Progress</h2><p class="muted">Coming in 3c.</p></section>
        <section v-else-if="view === 'settings'">
          <h2>Settings</h2>
          <label class="row">Effort scale
            <select v-model="effortScale" @change="saveEffortScale">
              <option value="rpe">RPE (1–10)</option>
              <option value="rir">RIR (0–5)</option>
            </select>
          </label>
          <button class="btn-secondary" @click="lock">Lock app</button>
        </section>
      </main>
      <nav class="tabbar">
        <button :class="{ active: view === 'home' }" @click="view = 'home'"><span class="ic">🏠</span>Home</button>
        <button :class="{ active: view === 'progress' }" @click="view = 'progress'"><span class="ic">📈</span>Progress</button>
        <button :class="{ active: view === 'settings' }" @click="view = 'settings'"><span class="ic">⚙️</span>Settings</button>
      </nav>
    </div>
  </div>
</body>
</html>
